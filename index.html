<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPS Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Rubik","Segoe UI",Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
       padding:14px;color:#26331a;user-select:none;overflow:hidden;
       background:radial-gradient(1000px 560px at 50% -10%,#3a7d2c,transparent 60%),
                  radial-gradient(700px 500px at 85% 115%,rgba(60,140,40,.5),transparent 60%),
                  linear-gradient(165deg,#16321a,#0a1c0e 75%)}
  #win{position:relative;width:700px;max-width:100%;background:linear-gradient(#d6ec9f,#bcdf7e);
       border:1px solid rgba(255,255,255,.4);border-radius:18px;overflow:hidden;
       box-shadow:0 26px 60px rgba(0,0,0,.6),0 0 0 4px #5e8a2c,0 0 0 6px rgba(255,255,255,.15),inset 0 1px 0 rgba(255,255,255,.5)}
  #titlebar{background:linear-gradient(#a6d165,#7fb23f);color:#23380f;font-weight:700;padding:8px 14px;
       display:flex;justify-content:space-between;align-items:center;font-size:.95rem;border-bottom:2px solid #5e8a2c;text-shadow:0 1px 0 rgba(255,255,255,.4)}
  .tbtns{display:flex;gap:6px;align-items:center}
  .iconbtn{background:#eef7d8;border:1px solid #5e8a2c;border-radius:8px;padding:2px 8px;font-size:.95rem;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .iconbtn:hover{transform:translateY(-1px)}
  .winbtns span{display:inline-block;width:16px;height:16px;line-height:14px;text-align:center;background:#eef7d8;border:1px solid #5e8a2c;border-radius:4px;margin-right:3px;font-size:11px}

  #main{display:flex;direction:ltr;gap:12px;padding:12px;align-items:stretch;flex-wrap:wrap;justify-content:center}
  #leftcol{display:flex;flex-direction:column;gap:6px}
  .nameband{text-align:center;font-weight:700;color:#fff;padding:5px 8px;border-radius:10px;font-size:1rem;letter-spacing:.3px;
       text-shadow:0 1px 3px rgba(0,0,0,.5);box-shadow:0 3px 8px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.45);transition:filter .15s}
  .nameband.blue{background:linear-gradient(#5cb3f0,#2471a3)} .nameband.red{background:linear-gradient(#ff8576,#c0392b)}
  .nameband.act{filter:brightness(1.12) saturate(1.2);box-shadow:0 0 0 2px #ffe45e,0 3px 10px rgba(0,0,0,.3)}

  #board{position:relative;box-sizing:content-box;width:436px;height:376px;
       background:linear-gradient(135deg,#43301a,#6a4a24);border-radius:14px;
       box-shadow:0 14px 30px rgba(0,0,0,.5),0 0 0 6px #6b4a22,0 0 0 8px #8a5a2b,inset 0 0 40px rgba(0,0,0,.45);transform-origin:center}
  #board::after{content:"";position:absolute;inset:0;border-radius:8px;pointer-events:none;z-index:6;box-shadow:inset 0 0 38px rgba(0,0,0,.5),inset 0 0 0 2px rgba(255,255,255,.08)}
  #petals,#fx{position:absolute;top:0;left:0;pointer-events:none}#petals{z-index:1}#fx{z-index:9}
  .cell{position:absolute;width:60px;height:60px}
  .cell.light{background:linear-gradient(160deg,#e3f4ad,#c2e283);box-shadow:inset 0 2px 3px rgba(255,255,255,.5),inset 0 -3px 5px rgba(60,90,20,.35)}
  .cell.dark{background:linear-gradient(160deg,#bce078,#97c956);box-shadow:inset 0 2px 3px rgba(255,255,255,.35),inset 0 -3px 5px rgba(50,80,15,.4)}
  .cell.mine{box-shadow:inset 0 0 0 2px rgba(255,231,77,.7),inset 0 2px 3px rgba(255,255,255,.4)}

  #banner{position:absolute;top:14px;left:50%;transform:translateX(-50%) translateY(-60px);z-index:10;padding:7px 24px;border-radius:30px;
       font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:1px;color:#fff;opacity:0;pointer-events:none;
       box-shadow:0 6px 16px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.5);white-space:nowrap}
  #banner.red{background:linear-gradient(#ff8576,#c0392b)}#banner.blue{background:linear-gradient(#5cb3f0,#2471a3)}
  #banner.show{animation:banner 1.5s ease}
  @keyframes banner{0%{transform:translateX(-50%) translateY(-60px);opacity:0}18%,78%{transform:translateX(-50%) translateY(0);opacity:1}100%{transform:translateX(-50%) translateY(-60px);opacity:0}}

  .arrow{position:absolute;width:60px;height:60px;pointer-events:none;z-index:7;display:flex;align-items:center;justify-content:center}
  .arrow svg{width:38px;height:38px}
  .arrow.move{animation:abounce .8s ease-in-out infinite}.arrow.move svg{filter:drop-shadow(0 0 5px #ffe000)}
  .arrow.attack{animation:abounce .5s ease-in-out infinite}.arrow.attack svg{filter:drop-shadow(0 0 6px #ff3b3b)}
  @keyframes abounce{0%,100%{transform:translateY(0) scale(.95)}50%{transform:translateY(-4px) scale(1.14)}}

  .piece{position:absolute;width:54px;height:54px;pointer-events:none;transition:transform .32s cubic-bezier(.34,1.5,.5,1);z-index:2}
  .piece.sel{z-index:5}
  .piece.sel::before{content:"";position:absolute;inset:-3px;border-radius:50%;z-index:-2;opacity:.85;
       background:conic-gradient(#fff3a0,#ffae42,#fff3a0,#ffd24a,#fff3a0);animation:spin 2.4s linear infinite;
       -webkit-mask:radial-gradient(circle,transparent 56%,#000 60%);mask:radial-gradient(circle,transparent 56%,#000 60%)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .piece.sel .ninja{filter:drop-shadow(0 0 8px #ffe000)}
  .csh{position:absolute;bottom:1px;left:50%;width:40px;height:10px;transform:translateX(-50%);border-radius:50%;
       background:radial-gradient(closest-side,rgba(0,0,0,.45),transparent);z-index:-1;animation:cshb 3s ease-in-out infinite}
  @keyframes cshb{0%,100%{transform:translateX(-50%) scaleX(1);opacity:.5}50%{transform:translateX(-50%) scaleX(.97);opacity:.46}}
  .ninja{width:100%;height:100%;animation:bob 2.6s ease-in-out infinite;animation-delay:var(--bd,0s);transform-origin:50% 100%;filter:drop-shadow(0 3px 2px rgba(0,0,0,.28))}
  @keyframes bob{0%,100%{transform:translateY(0) scaleY(1) scaleX(1) rotate(0)}28%{transform:translateY(-1px) scaleY(1.028) scaleX(.986) rotate(-1deg)}55%{transform:translateY(-2.4px) scaleY(1.05) scaleX(.97) rotate(0)}80%{transform:translateY(-.6px) scaleY(1.015) scaleX(.992) rotate(1deg)}}
  .ninja.hop,.ninja.win{animation:celebrate .72s cubic-bezier(.3,1.25,.5,1)}
  @keyframes celebrate{0%{transform:translateY(0) scale(1)}18%{transform:translateY(-3px) scaleY(.8) scaleX(1.18)}44%{transform:translateY(-27px) rotate(-13deg) scale(1.07)}62%{transform:translateY(-25px) rotate(13deg) scale(1.05)}82%{transform:translateY(0) scaleY(.82) scaleX(1.18)}100%{transform:translateY(0) scale(1)}}
  .ninja.flip{animation:flip .52s cubic-bezier(.42,.04,.38,1);transform-origin:50% 52%}
  @keyframes flip{0%{transform:translateY(0) rotate(0) scaleY(.82) scaleX(1.16)}16%{transform:translateY(-30px) rotate(-130deg) scale(1.02)}50%{transform:translateY(-40px) rotate(-300deg) scale(1.04)}82%{transform:translateY(-2px) rotate(-358deg) scaleY(.76) scaleX(1.18)}100%{transform:translateY(0) rotate(-360deg) scaleY(1) scaleX(1)}}
  .sword{transform-box:fill-box;transform-origin:50% 100%;opacity:0;transition:opacity .1s}
  .ninja.flip .sword{opacity:1}
  .slash{position:absolute;width:72px;height:72px;pointer-events:none;z-index:8;border-radius:50%;
       border:5px solid transparent;border-top-color:rgba(255,255,255,.95);border-right-color:rgba(255,255,255,.5);animation:slashfx .42s ease-out forwards}
  @keyframes slashfx{0%{transform:rotate(-50deg) scale(.4);opacity:0}35%{opacity:1}100%{transform:rotate(310deg) scale(1.35);opacity:0}}
  .piece.hit .ninja{animation:shakeP .26s}@keyframes shakeP{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px) rotate(-7deg)}75%{transform:translateX(6px) rotate(7deg)}}
  .piece.jig .ninja{animation:jig .4s ease-in-out infinite}@keyframes jig{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-10px) rotate(8deg)}}
  .eyes{transform-box:fill-box;transform-origin:center;animation:blink 5.5s infinite}@keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}

  .weapon{position:absolute;top:-5px;left:-5px;width:25px;height:25px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#e6e6e6);
       box-shadow:0 2px 4px rgba(0,0,0,.5),inset 0 1px 0 #fff;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0);
       transition:transform .25s cubic-bezier(.34,1.7,.5,1),opacity .2s;z-index:3;border:1.5px solid rgba(0,0,0,.12)}
  .weapon svg{width:18px;height:18px;display:block}
  .piece.show .weapon{opacity:1;transform:scale(1)}
  .piece.reveal .weapon{transform:scale(2.1);top:-30px;left:15px;box-shadow:0 0 14px #ffd400,0 2px 5px rgba(0,0,0,.5)}

  .flash{position:absolute;width:60px;height:60px;border-radius:50%;pointer-events:none;z-index:8;background:radial-gradient(circle,#fff,rgba(255,255,255,0) 70%);animation:flash .5s ease-out forwards}
  @keyframes flash{0%{transform:scale(.3);opacity:.95}100%{transform:scale(2.8);opacity:0}}
  .boardflash{position:absolute;inset:0;z-index:8;background:radial-gradient(circle at center,#fff,#fff8 70%,transparent);pointer-events:none;border-radius:8px;animation:bflash .42s ease-out forwards}
  @keyframes bflash{0%{opacity:.9}100%{opacity:0}}
  .shock{position:absolute;width:60px;height:60px;border-radius:50%;border:4px solid rgba(255,255,255,.95);pointer-events:none;z-index:8;animation:shock .6s ease-out forwards}
  @keyframes shock{0%{transform:scale(.2);opacity:.95}100%{transform:scale(3.4);opacity:0}}
  .speed{position:absolute;width:170px;height:170px;pointer-events:none;z-index:7;border-radius:50%;
       background:repeating-conic-gradient(from 0deg,rgba(255,255,255,.55) 0 3deg,transparent 3deg 13deg);
       -webkit-mask:radial-gradient(circle,transparent 24%,#000 26%,#000 52%,transparent 56%);mask:radial-gradient(circle,transparent 24%,#000 26%,#000 52%,transparent 56%);animation:speed .55s ease-out forwards}
  @keyframes speed{0%{transform:scale(.4) rotate(0);opacity:.85}100%{transform:scale(1.5) rotate(26deg);opacity:0}}
  .winring{position:absolute;width:60px;height:60px;border-radius:50%;z-index:6;pointer-events:none;box-shadow:0 0 0 4px rgba(255,232,90,.95);animation:winr .65s ease-out forwards}
  @keyframes winr{0%{transform:scale(.4);opacity:.95}100%{transform:scale(2.4);opacity:0}}
  .hole{position:absolute;width:64px;height:64px;border-radius:50%;z-index:8;pointer-events:none;
       background:radial-gradient(circle,#000 30%,#3a1060 55%,#7a3bd0 70%,transparent 75%);box-shadow:0 0 24px #6a2bd0;animation:holespin .9s linear infinite}
  @keyframes holespin{to{transform:rotate(360deg)}}
  .clash{position:absolute;width:124px;height:60px;display:flex;align-items:center;justify-content:center;gap:8px;pointer-events:none;z-index:9}
  .clash .ci{width:46px;height:46px;filter:drop-shadow(0 4px 5px rgba(0,0,0,.5))}.clash .ci svg{width:100%;height:100%}
  .clash .ciL{animation:ciL .42s cubic-bezier(.3,1.7,.5,1) both}.clash .ciR{animation:ciR .42s cubic-bezier(.3,1.7,.5,1) both}
  @keyframes ciL{0%{transform:translateX(-72px) rotate(-50deg) scale(.4);opacity:0}65%{opacity:1}100%{transform:translateX(0) rotate(0) scale(1)}}
  @keyframes ciR{0%{transform:translateX(72px) rotate(50deg) scale(.4);opacity:0}65%{opacity:1}100%{transform:translateX(0) rotate(0) scale(1)}}
  #board.cam{animation:cam .5s ease-out}
  @keyframes cam{0%{transform:scale(1) translate(0,0)}12%{transform:scale(1.07) translate(-4px,3px)}26%{transform:scale(1.06) translate(5px,-3px)}44%{transform:scale(1.04) translate(-4px,-2px)}64%{transform:scale(1.025) translate(3px,2px)}100%{transform:scale(1) translate(0,0)}}

  #right{position:relative;width:176px;display:flex;flex-direction:column;align-items:center;gap:7px;color:#ffe9c4;
       background:linear-gradient(#a32c1d,#6e1c12);border:2px solid #e8b84a;border-radius:14px;padding:18px 8px 10px;
       box-shadow:inset 0 0 0 2px rgba(255,220,120,.22),inset 0 2px 0 rgba(255,255,255,.15),0 6px 16px rgba(0,0,0,.4)}
  .lantern{position:absolute;top:3px;width:15px;height:20px;border-radius:50%/42%;background:radial-gradient(circle at 40% 35%,#ff7a6b,#c0392b);
       border:1.5px solid #e8b84a;box-shadow:0 0 8px rgba(255,140,70,.5);transform-origin:top center;animation:lsway 3s ease-in-out infinite;z-index:2}
  .lantern::before{content:"";position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:8px;height:3px;background:#e8b84a;border-radius:2px}
  .lantern::after{content:"";position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:2px;height:6px;background:#ffd24a}
  .lantern.l1{left:12px}.lantern.l2{right:12px;animation-delay:-1.5s}
  @keyframes lsway{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
  .logo{font-family:"Fredoka","Rubik",sans-serif;text-align:center;line-height:1;font-weight:700;font-style:italic;color:#ffd24a;
       text-shadow:1px 1px 0 #7a1f14,2px 2px 3px rgba(0,0,0,.45);animation:logoglow 2.6s ease-in-out infinite}
  @keyframes logoglow{0%,100%{filter:drop-shadow(0 0 2px rgba(255,210,74,.4))}50%{filter:drop-shadow(0 0 9px rgba(255,220,120,.85))}}
  .logo b{font-size:2rem;letter-spacing:1px}.logo span{font-size:.95rem;color:#ffe9c4;letter-spacing:4px}
  #score{background:linear-gradient(#fff,#eef);border:2px solid #8fb85a;border-radius:18px;padding:3px 14px;font-size:1.05rem;font-weight:700;box-shadow:inset 0 1px 0 #fff,0 2px 4px rgba(0,0,0,.12)}
  .ref{width:152px;height:124px;filter:drop-shadow(0 5px 5px rgba(0,0,0,.3))}
  .reffig{transform-box:fill-box;transform-origin:50% 100%;animation:refbob 2.8s ease-in-out infinite}
  @keyframes refbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .refeyes{transform-box:fill-box;transform-origin:center;animation:blink 4s infinite}
  .gongdisc{transform-box:fill-box;transform-origin:center;animation:gongshim 3s ease-in-out infinite}
  @keyframes gongshim{0%,100%{filter:brightness(1)}50%{filter:brightness(1.13)}}
  .marm{transform-box:fill-box;transform-origin:90% 55%}
  .gongwave{opacity:0;transform-box:fill-box;transform-origin:center;stroke:#ffe45e}
  .ref[data-turn="red"] .gongwave{stroke:#ff6b5b} .ref[data-turn="blue"] .gongwave{stroke:#5db0ff}
  .ref.bang .marm{animation:gswing .5s ease-in-out}
  @keyframes gswing{0%{transform:rotate(0)}22%{transform:rotate(-30deg)}46%{transform:rotate(12deg)}70%{transform:rotate(-4deg)}100%{transform:rotate(0)}}
  .ref.bang .gongdisc{animation:gvib .6s ease-out}
  @keyframes gvib{0%,100%{transform:scale(1,1) rotate(0)}14%{transform:scale(1.05,.95) rotate(-2deg)}30%{transform:scale(.96,1.05) rotate(2deg)}48%{transform:scale(1.02,.99) rotate(-1deg)}}
  .ref.bang .gongwave{animation:gwave .65s ease-out}
  @keyframes gwave{0%{opacity:.7;transform:scale(.55)}100%{opacity:0;transform:scale(1.4)}}
  #turnLbl{font-weight:700;font-size:.9rem;color:#ffe9c4;letter-spacing:1px}
  #timer{position:relative;width:66px;height:66px}#timer svg{width:66px;height:66px;transform:rotate(-90deg)}
  #timer .tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:"Fredoka";font-size:1.7rem;font-weight:700;color:#555}
  #timer.low .tnum{color:#e23b2e;animation:lowp .5s ease-in-out infinite}@keyframes lowp{50%{transform:scale(1.16)}}
  #statusP{font-size:.84rem;font-weight:600;text-align:center;min-height:2.4em;color:#ffe9c4}
  #muteBtn{background:#fff;border:2px solid #8fb85a;padding:4px 12px;font-size:1rem;border-radius:16px}

  #log{margin:0 12px;background:linear-gradient(#3f5723,#34491c);color:#eaffd0;padding:7px 12px;border-radius:10px;font-size:.92rem;text-align:center;
       min-height:1.4em;box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 3px 8px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;gap:6px;font-weight:500}
  #log svg{width:16px;height:16px;vertical-align:middle}
  .bar{display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap;padding:8px 12px}
  button{font-family:inherit;padding:8px 16px;font-size:.9rem;font-weight:700;border:none;border-radius:18px;cursor:pointer;
       background:linear-gradient(#ffe45e,#ffc400);color:#5a4500;box-shadow:0 3px 7px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.7);transition:transform .1s;position:relative;overflow:hidden}
  button:hover{transform:translateY(-2px)}button:active{transform:translateY(0) scale(.97)}
  .brush{width:48px;height:48px;border-radius:12px;background:linear-gradient(#fff,#eef0e0);padding:5px}
  .brush svg{width:100%;height:100%}.brush.on{outline:4px solid #ffc400;transform:scale(1.06)}
  .hide{display:none !important}

  #chatbar{border-top:2px solid #8fb85a;background:linear-gradient(rgba(255,255,255,.5),rgba(230,243,200,.55));padding:8px 12px}
  #chatlog{height:42px;overflow-y:auto;font-size:.85rem;margin-bottom:6px}
  .msg{margin:2px 0}.msg b.me{color:#c0392b}.msg b.cpu{color:#2471a3}
  #chatrow{display:flex;gap:6px}
  #chatinput{font-family:inherit;flex:1;padding:7px 10px;border:2px solid #8fb85a;border-radius:18px;font-size:.9rem}
  #legend{text-align:center;font-size:.78rem;color:#33491c;padding:0 12px 8px;line-height:1.5}
  #win{transition:transform .25s ease}
  body.maxed{overflow:hidden}
  #win.playing #chatbar,#win.playing #legend{display:none}
  .card,#settings .card,#unlocks .card,#shop .card,#overlay .card{direction:rtl}
  #log,#statusP,.nameband,#legend,#placebar>span,#chatbar{direction:rtl}

  #overlay,#settings,#choice{position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
       background:radial-gradient(circle at 50% 30%,rgba(40,70,30,.6),rgba(8,16,8,.82));backdrop-filter:blur(5px)}
  #settings{z-index:60}#choice{z-index:55}
  #overlay.hide,#settings.hide,#choice.hide{display:none}
  .card{background:linear-gradient(#fff,#f3f7e8);border:1px solid rgba(255,255,255,.7);border-radius:22px;padding:22px 26px;max-width:500px;
       text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 0 4px #5e8a2c,inset 0 1px 0 #fff;animation:pop .35s cubic-bezier(.34,1.6,.5,1)}
  @keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
  .card h1{font-family:"Fredoka",sans-serif;font-size:2.1rem;color:#3a6e1f;margin-bottom:2px}
  .card h2{font-family:"Fredoka",sans-serif;color:#3a6e1f;margin-bottom:8px;font-size:1.6rem}
  .card p{color:#33401f;margin:6px 0;line-height:1.5}
  .optrow{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}.optg{margin:9px 0}
  .optg .gl{display:block;font-size:.74rem;letter-spacing:1px;color:#999;margin-bottom:5px;font-weight:600;text-transform:uppercase}
  .opt{margin:3px;background:linear-gradient(#f3f8e8,#e6efd6);color:#33401f;box-shadow:0 2px 4px rgba(0,0,0,.12);padding:8px 14px}
  .opt.on{background:linear-gradient(#ffe45e,#ffc400);color:#5a4500;box-shadow:inset 0 0 0 3px #e8a800,0 2px 5px rgba(0,0,0,.2)}
  .bigbtn{margin-top:14px;font-size:1.2rem;padding:13px 36px;background:linear-gradient(#7bc23f,#4f8a23);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:11px 2px}
  input[type=range]{accent-color:#5e8a2c;flex:1}
  .hint{margin-top:12px;font-size:.78rem;color:#999}.hint a{color:#5e8a2c;cursor:pointer}
  .wbtn{width:90px;height:96px;border-radius:16px;border:2px solid rgba(120,150,60,.3);background:linear-gradient(#fff,#eef0dc);cursor:pointer;
       display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#3a5220;font-weight:700;font-size:.82rem;margin:5px;transition:.12s}
  .wbtn:hover{transform:translateY(-4px);border-color:#ffc400;box-shadow:0 8px 18px rgba(0,0,0,.25)}
  .wbtn svg{width:46px;height:46px}
  body.theme-russia .cell.light{background:linear-gradient(160deg,#eef6ff,#cfe3f5)} body.theme-russia .cell.dark{background:linear-gradient(160deg,#bcd6ee,#9bbfe0)}
  body.theme-sakura .cell.light{background:linear-gradient(160deg,#ffe9f1,#ffd2e3)} body.theme-sakura .cell.dark{background:linear-gradient(160deg,#ffc8de,#f4abc9)}
  body.theme-sands .cell.light{background:linear-gradient(160deg,#f5e6b8,#e6cf86)} body.theme-sands .cell.dark{background:linear-gradient(160deg,#e2c476,#cba959)}

function netLog(who,t){const l=$("netlog");if(!l)return;const d=document.createElement("div");d.style.margin="2px 0";d.textContent=who+": "+t;l.appendChild(d);l.scrollTop=l.scrollHeight;}
function showOnline(){const u=$("online");u.classList.remove("hide");

  $("oCreate").onclick=hostGame;$("oJoin").onclick=joinPrompt;

function needPeer(){if(typeof Peer==="undefined"){alert("ספריית הרשת לא נטענה — צריך אינטרנט. פתח דרך הלינק של האתר.");return false;}return true;}
function hostGame(){if(!needPeer())return;isHost=true;closePeer();const code=genCode();
  $("oBody").innerHTML=`<div class="ost" id="ost">פותח חדר…</div>`;
  peer=new Peer("rpsx-"+code);
  peer.on("open",()=>{myCode=code;$("oBody").innerHTML=`<p style="margin:6px 0 2px">שתף את הקוד עם היריב:</p><div class="code">${code}</div><div class="ost" id="ost">⏳ ממתין שהיריב יצטרף…</div>`;});
  peer.on("connection",c=>{conn=c;bindConn();});
  peer.on("error",e=>{if(e&&e.type==="unavailable-id"){hostGame();return;}oStat("שגיאה: "+((e&&e.type)||e));});
}
function joinPrompt(){if(!needPeer())return;isHost=false;
  $("oBody").innerHTML=`<input class="codein" id="codein" maxlength="5" placeholder="הקלד קוד"><div class="obtns"><button class="bigbtn" id="oGo">התחבר ▶</button></div><div class="ost" id="ost"></div>`;
  $("oGo").onclick=()=>{const code=(($("codein").value)||"").trim().toUpperCase();if(code.length<4){oStat("קוד לא תקין");return;}
    closePeer();oStat("מתחבר…");peer=new Peer();
    peer.on("open",()=>{conn=peer.connect("rpsx-"+code,{reliable:true});bindConn();});
    peer.on("error",e=>{oStat("שגיאה: "+((e&&e.type)||e)+" — בדוק את הקוד");});};
}
function bindConn(){
  conn.on("open",()=>{online=true;oStat("✅ מחובר! "+(isHost?"אתה המארח":"הצטרפת"));netSend({t:"hi"});
    const b=$("oBody");if(b)b.innerHTML+=`<p style="color:#2e7d32;font-weight:700;margin:8px 0 4px">מחוברים! 🎉 בדקו צ'אט (סנכרון המשחק בשלב הבא):</p>
      <div id="netlog" style="max-height:120px;overflow-y:auto;text-align:right;font-size:.86rem;background:#f6f8ef;border-radius:8px;padding:6px;margin-bottom:6px"></div>

    const ns=$("netsend");if(ns)ns.onclick=netChatSend;const nc=$("netchat");if(nc)nc.addEventListener("keydown",e=>{if(e.key==="Enter")netChatSend();});});
  conn.on("data",handleNet);
  conn.on("close",()=>{online=false;oStat("היריב התנתק ✖");});
  conn.on("error",e=>{oStat("שגיאת חיבור: "+((e&&e.type)||e));});
}
function netChatSend(){const i=$("netchat");if(!i)return;const t=i.value.trim();if(!t)return;netLog("אתה",t);netSend({t:"chat",text:t});i.value="";}
function handleNet(msg){if(!msg||typeof msg!=="object")return;

}

  ownPieces("blue").forEach(p=>getMoves(p.r,p.c).forEach(m=>moves.push({p,m})));if(!moves.length){endGame("red");return;}
  moves.forEach(o=>{const adv=o.m.r-o.p.r;let s;

    else s=Math.random()+adv*.6+(o.m.attack?.8:0);if(o.p.type==="flag")s-=2.5;o.s=s;});

async function doMove(fr,fc,tr,tc){
  const mover=pieces[grid[fr][fc]],tid=grid[tr][tc],mdr=tr-fr,mdc=tc-fc;
  grid[fr][fc]=null;mover.r=tr;mover.c=tc;hopMove(mover);setPos(mover);
  if(!tid){sMove();await sleep(420);dust(px(tc)+CELL/2,py(tr)+CELL-4);grid[tr][tc]=mover.id;await sleep(80);return;}
  const def=pieces[tid];await sleep(360);
  const cx=px(tc)+CELL/2,cy=py(tr)+CELL/2;
  if(def.type==="wood"){
    statusEl.textContent="⚫ קללת הטוטם — חור שחור!";sVoid();cameraPunch();
    const hole=elFX("hole",tr,tc,64);inward(cx,cy,"#b06bff");
    mover.el.style.transition="transform .8s cubic-bezier(.4,0,.7,1),opacity .8s";
    mover.el.style.transform=`translate(${px(tc)+OFF}px,${py(tr)+OFF}px) scale(.05) rotate(900deg)`;mover.el.style.opacity="0";
    delete pieces[mover.id];const me=mover.el;setTimeout(()=>me.remove(),820);
    await sleep(850);hole.remove();grid[tr][tc]=def.id;
    if(def.owner==="blue"&&mode==="cpu")def.el.classList.remove("show");
    logEl.innerHTML=`🪵 → ⚫ <b>הטוטם של ${pname(def.owner)} בלע את התוקף!</b>`;
    setVisibility(visViewer());return;
  }
  if(def.type==="flag"){
    cameraPunch();boardFlash();flashAt(tr,tc);sFlag();sparks(cx,cy,"#ffd24a",26);winRingAt(tr,tc);
    killAway(def,mdr,mdc);grid[tr][tc]=mover.id;
    if(mover.owner==="blue"&&mode==="cpu")mover.el.classList.remove("show");
    logEl.innerHTML=`👑 <b>${pname(mover.owner)} לכד את המצביא!</b>`;
    setVisibility(visViewer());await sleep(650);endGame(mover.owner);return;
  }
  cameraPunch();boardFlash();flashAt(tr,tc);shockAt(tr,tc);speedAt(tr,tc);sClash();sparks(cx,cy,"#fff",22);
  const clashEl=showClash(mover.type,def.type,tr,tc);
  mover.el.classList.add("show","hit");def.el.classList.add("show","hit");
  await sleep(820);clashEl.remove();mover.el.classList.remove("hit");def.el.classList.remove("hit");
  let res=fight(mover.type,def.type),guard=0;
  while(res==="tie"&&guard++<8){
    statusEl.textContent="תיקו! שני הלוחמים בוחרים נשק מחדש…";sFlag();
    if(ninjaOf(mover))mover.el.classList.add("jig");if(ninjaOf(def))def.el.classList.add("jig");
    const mt=await pickWeapon(mover.owner),dt=await pickWeapon(def.owner);
    mover.el.classList.remove("jig");def.el.classList.remove("jig");
    setType(mover,mt);setType(def,dt);
    cameraPunch();flashAt(tr,tc);sClash();sparks(cx,cy,"#ffd24a",16);await sleep(620);
    res=fight(mover.type,def.type);
  }
  recordReveal(mover);recordReveal(def);
  const wlog=txt=>`<span style="display:inline-flex;align-items:center;gap:5px">${iconOf(mover.type)} ⚔ ${iconOf(def.type)} → ${txt}</span>`;
  const loser=res==="a"?def:mover,dCh=isMine(loser.owner)?Math.min(.5,.12*(up().dodge||0)):0;
  if(dCh>0&&Math.random()<dCh){
    tone(720,.1,"sine",.06);tone(1020,.12,"sine",.05,.06);flashAt(tr,tc);statusEl.textContent="💨 התחמק מהמכה!";
    mover.r=fr;mover.c=fc;grid[fr][fc]=mover.id;grid[tr][tc]=def.id;hopMove(mover);setPos(mover);
    if(mover.owner==="blue"&&mode==="cpu")mover.el.classList.remove("show");
    if(def.owner==="blue"&&mode==="cpu")def.el.classList.remove("show");
    logEl.innerHTML=wlog(`<b>💨 התחמקות!</b>`);setVisibility(visViewer());updateCounts();await sleep(520);return;
  }
  if(res==="a"){killAway(def,mdr,mdc);grid[tr][tc]=mover.id;hop(mover);winRingAt(tr,tc);if(mover.owner==="blue"&&mode==="cpu")mover.el.classList.remove("show");logEl.innerHTML=wlog(`<b>${NAME[mover.type]} ניצח! ⚡</b>`);}
  else{killAway(mover,-mdr,-mdc);grid[tr][tc]=def.id;hop(def);winRingAt(tr,tc);if(def.owner==="blue"&&mode==="cpu")def.el.classList.remove("show");logEl.innerHTML=wlog(`<b>${NAME[def.type]} ניצח! ⚡</b>`);}
  setVisibility(visViewer());updateCounts();await sleep(560);
}
function visViewer(){return mode==="cpu"?"red":turn;}

const chatlog=$("chatlog"),chatinput=$("chatinput");
const TAUNTS=["בהצלחה! 😏","אני אנצח 💪","מהלך מעניין...","חחח 😄","אתה בטוח? 🤔","הנינג'ות שלי מוכנות!","ננצח אותך! ⚔️"];
function addChat(who,txt){const d=document.createElement("div");d.className="msg";d.innerHTML=`<b class="${who}">${who==="me"?"אתה":"מחשב"}:</b> ${txt}`;chatlog.appendChild(d);chatlog.scrollTop=chatlog.scrollHeight;}
function sendChat(){const t=chatinput.value.trim();if(!t)return;ac();addChat("me",t);chatinput.value="";if(mode==="cpu")setTimeout(()=>addChat("cpu",rnd(TAUNTS)),600+Math.random()*600);}
$("chatsend").onclick=sendChat;chatinput.addEventListener("keydown",e=>{if(e.key==="Enter")sendChat();});
chatinput.placeholder="כתוב הודעה...";
$("legend").textContent="כל חייל הוא בסוד אבן/נייר/מספריים · כניסה ליריב = קרב · 60 שניות לכל תור";

ref.innerHTML=refSVG();setupCanvas();applyTheme();
if("speechSynthesis"in window){try{speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>{};}catch(e){}}
if(localStorage.getItem("rps_terms")==="1")showSetup();else showTerms();
</script>
